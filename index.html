<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Notes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #faf9f7;
      --surface: #f0ede8;
      --border: #d4cfc6;
      --text: #1a1814;
      --text-muted: #6b6560;
      --accent: #3d5a80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      padding: 4rem 2rem;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 1.05rem;
      font-style: italic;
      color: var(--text-muted);
    }

    .search-wrap {
      margin: 2rem 0;
    }

    #search {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus {
      border-color: var(--accent);
    }

    #search::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .section {
      margin-bottom: 2.5rem;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .section-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .file-list {
      list-style: none;
    }

    .file-item {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--surface);
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-link {
      color: var(--text);
      text-decoration: none;
      font-size: 1.05rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s;
    }

    .file-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .file-ext {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .file-size {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .no-results {
      color: var(--text-muted);
      font-style: italic;
      padding: 1.5rem 0;
    }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }

    @media (max-width: 600px) {
      body { padding: 2rem 1.2rem; }
      h1 { font-size: 1.7rem; }
      .file-size { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <h1>LLM Notes</h1>
    <p class="subtitle">An indexed collection of resources — updated automatically on every push.</p>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search files…" oninput="filterFiles()">
    </div>
    <p class="meta" id="meta">Loading…</p>
  </header>

  <main id="content">Loading…</main>

  <footer>
    Auto-indexed by GitHub Actions · <a href="https://github.com/37b0d8i/llm-notes" style="color:inherit">View source</a>
  </footer>

  <script>
    const CATEGORY_LABELS = {
      documents: 'Documents',
      images: 'Images',
      audio: 'Audio',
      video: 'Video',
      data: 'Data',
      code: 'Code',
      archives: 'Archives',
    };

    function labelForCat(cat) {
      return CATEGORY_LABELS[cat] || cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatSize(bytes) {
      if (bytes == null) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    let allFiles = [];

    async function loadIndex() {
      try {
        const res = await fetch('index.json');
        if (!res.ok) throw new Error();
        allFiles = await res.json();
        document.getElementById('meta').textContent =
          `${allFiles.length} file${allFiles.length !== 1 ? 's' : ''} indexed`;
        render();
      } catch {
        document.getElementById('content').innerHTML =
          '<p class="no-results">index.json not found — push to trigger regeneration.</p>';
        document.getElementById('meta').textContent = '';
      }
    }

    function render(files) {
      files = files || allFiles;
      const q = document.getElementById('search').value.trim().toLowerCase();
      const filtered = q
        ? files.filter(f =>
            f.name.toLowerCase().includes(q) ||
            f.path.toLowerCase().includes(q) ||
            (f.category && f.category.toLowerCase().includes(q))
          )
        : files;

      if (filtered.length === 0) {
        document.getElementById('content').innerHTML =
          '<p class="no-results">No files match your search.</p>';
        return;
      }

      const byCat = {};
      for (const f of filtered) {
        const cat = f.category || 'documents';
        if (!byCat[cat]) byCat[cat] = [];
        byCat[cat].push(f);
      }

      const catOrder = Object.keys(byCat).sort();
      let html = '';

      for (const cat of catOrder) {
        if (!byCat[cat] || byCat[cat].length === 0) continue;
        const label = labelForCat(cat);
        const items = byCat[cat].sort((a, b) => a.name.localeCompare(b.name));

        html += `<section class="section">
          <div class="section-header">
            <span class="section-title">${label}</span>
            <span class="section-count">${items.length}</span>
            <div class="divider"></div>
          </div>
          <ul class="file-list">`;

        for (const f of items) {
          html += `<li class="file-item">
            <a class="file-link" href="${f.path}">${f.name}</a>
            <span class="file-ext">${f.ext}</span>
            <span class="file-size">${formatSize(f.size)}</span>
          </li>`;
        }

        html += `</ul></section>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    function filterFiles() { render(); }

    loadIndex();
  </script>
</body>
</html>
